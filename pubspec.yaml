name: marketplace
description: "A marketplace Flutter application."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev


version: 1.0.0+1

environment:
  sdk: ^3.9.0


dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  lottie: ^3.3.1
  go_router: ^16.2.0
  shared_preferences: ^2.2.3   # ⚠️ у тебя было ^2.5.3, такой версии нет
  flutter_svg: ^2.2.0
  flutter_secure_storage: ^9.2.2
  intl: ^0.20.2
  image_picker: ^1.0.7
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.9        # ✅ стабильная версия для Riverpod 2.x
  riverpod_generator: ^2.6.1

flutter:

  uses-material-design: true
  assets:
    - assets/animations/
    - assets/images/